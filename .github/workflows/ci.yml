name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: mypy
        run: uv run mypy libs scrapers enrichment orchestration

      - name: pytest
        run: uv run pytest --cov=jmi_core --cov=jmi_scrapers --cov=jmi_enrichment --cov-report=term-missing

  dbt:
    name: dbt parse (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: dbt deps + parse (local DuckDB target)
        working-directory: dbt/jmi
        env:
          DBT_TARGET: ci
        run: |
          uvx --with dbt-duckdb dbt deps
          uvx --with dbt-duckdb dbt parse
