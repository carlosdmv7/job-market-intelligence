version: 2

models:
  - name: stg_job_postings
    description: Cleaned posting observations (event log preserved).
    columns:
      - name: content_hash
        data_tests: [not_null]
      - name: source
        data_tests:
          - not_null
          - accepted_values:
              values: [remotive, arbeitnow, remoteok, adzuna, linkedin, indeed, honeypot, techmeabroad, infojobs, stepstone, irishjobs, itjobs]
      - name: scraped_date
        data_tests: [not_null]

  - name: stg_job_enrichment
    description: Cleaned LLM enrichment, one row per content_hash.
    columns:
      - name: content_hash
        data_tests: [not_null, unique]
      - name: visa_confidence
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              where: "visa_confidence is not null"

  - name: stg_recognised_sponsors
    description: >
      IND recognised-sponsor register (NL), one row per normalized company name.
      Deterministic, no-LLM lookup for the visa-sponsor flag. Refresh the seed
      monthly with `make sponsors-refresh`.
    columns:
      - name: company_norm
        description: Normalized company name (join key), via jmi_normalize_company.
        data_tests: [not_null, unique]
