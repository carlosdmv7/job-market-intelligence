# Prefect 3 project / deployment config — the documented path to a
# worker-based production setup. It is NOT what schedules this project today:
# the 0-cost scheduler is GitHub Actions (.github/workflows/pipeline.yml),
# which runs the same flows daily; runs report to Prefect Cloud either way.
#
# To go worker-based (needs a machine that is always on — not 0€):
#   prefect work-pool create jmi-pool --type process
#   cd orchestration && prefect deploy --all
#   prefect worker start --pool jmi-pool
#
# Secrets (motherduck_token, ADZUNA_APP_ID/KEY, GEMINI_API_KEY) come from the
# worker environment or Prefect blocks — never committed.

name: jmi-engine
prefect-version: ">=3.0.0"

pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/carlosdmv7/job-market-intelligence.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      directory: "{{ clone-output }}"
      script: uv sync --package jmi-flows

definitions:
  work_pool: &work_pool
    name: jmi-pool
    work_queue_name: default

deployments:
  - name: ingest-adzuna-nl # the relocation corpus — the source that matters
    entrypoint: orchestration/jmi_flows/ingest.py:ingest_flow
    parameters:
      source: adzuna
    work_pool: *work_pool
    schedules:
      - cron: "0 6 * * *" # 06:00 daily — produces a fresh FT_JOB_SNAPSHOT_DAILY row
        timezone: Europe/Amsterdam

  - name: enrich
    entrypoint: orchestration/jmi_flows/enrich.py:enrich_flow
    work_pool: *work_pool
    schedules:
      - cron: "30 6 * * *" # 06:30 daily — after ingestion
        timezone: Europe/Amsterdam
